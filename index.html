<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Inicio Sesión Retro Consola CMD con CRT</title>
<style>
  /* Estilos generales: fondo negro, verde consola, pixelado */
  body {
    margin: 0; padding: 0;
    background: #001100;
    font-family: 'Courier New', Courier, monospace;
    color: #33FF33;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    -webkit-font-smoothing: none;
    -moz-osx-font-smoothing: grayscale;
    image-rendering: pixelated;
  }

  /* Caja principal */
  .login-box {
    background: #002200cc;
    border: 2px solid #006600;
    width: 380px;
    border-radius: 6px;
    box-shadow: 0 0 20px #009900aa;
    padding: 20px;
    box-sizing: border-box;
    position: relative;
  }

  /* Título estilo consola */
  .title {
    font-size: 1.6rem;
    font-weight: bold;
    text-align: center;
    margin-bottom: 15px;
    color: #22FF22;
    text-shadow: 0 0 8px #22FF22;
    letter-spacing: 0.12em;
  }

  /* Lista de usuarios */
  .users-list {
    max-height: 400px;
    overflow-y: auto;
  }

  /* Cada usuario */
  .user-item {
    background: #003300;
    border: 1px solid #006600;
    margin-bottom: 8px;
    padding: 10px;
    border-radius: 5px;
    cursor: pointer;
    user-select: none;
  }
  .user-item:hover {
    background: #005500;
    border-color: #00AA00;
  }

  .user-item-flex {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .user-item img {
    width: 48px;
    height: 48px;
    border-radius: 6px;
    border: 1px solid #006600;
    object-fit: cover;
    filter: drop-shadow(0 0 3px #33FF33);
    image-rendering: pixelated;
  }

  .user-name {
    font-size: 1.2rem;
    font-weight: 700;
    color: #33FF33;
    text-shadow: 0 0 5px #22CC22;
  }

  /* Botones pequeños encima derecha */
  .user-controls {
    margin-left: auto;
    display: flex;
    gap: 6px;
  }
  .user-controls button {
    font-family: 'Courier New', monospace;
    font-size: 0.75rem;
    padding: 4px 7px;
    border-radius: 3px;
    border: 1px solid #00AA00;
    background: #004400;
    color: #33FF33;
    cursor: pointer;
    box-shadow: 0 0 5px #00FF00;
    user-select: none;
    transition: all 0.2s;
  }
  .user-controls button:hover {
    background: #22FF22;
    color: #002200;
    border-color: #22FF22;
    box-shadow: 0 0 10px #22FF22;
  }

  /* Botones inferiores */
  .bottom-buttons {
    margin-top: 15px;
    display: flex;
    justify-content: space-between;
  }
  .bottom-buttons button {
    font-family: 'Courier New', monospace;
    background: #003300;
    border: 1px solid #006600;
    color: #33FF33;
    font-weight: bold;
    font-size: 1.1rem;
    padding: 10px 10px;
    border-radius: 5px;
    cursor: pointer;
    box-shadow: 0 0 8px #00FF00;
    transition: all 0.3s;
  }
  .bottom-buttons button:hover {
    background: #00FF00;
    color: #001100;
    border-color: #00FF00;
    box-shadow: 0 0 20px #00FF00;
  }

  /* Modal editar cuenta */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,25,0,0.9);
    backdrop-filter: blur(4px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 100;
  }
  .modal {
    background: #002200cc;
    padding: 20px;
    border-radius: 6px;
    width: 320px;
    box-shadow: 0 0 10px #00FF00;
    color: #33FF33;
    font-family: 'Courier New', monospace;
  }
  .modal h2 {
    font-weight: bold;
    color: #00FF00;
    margin-top: 0;
    margin-bottom: 15px;
    text-shadow: 0 0 8px #00FF00;
  }
  .modal label {
    margin-bottom: 6px;
    display: block;
  }
  .modal input[type="text"],
  .modal input[type="file"] {
    width: 100%;
    padding: 8px;
    background: #003300;
    color: #33FF33;
    border: 1px solid #004400;
    border-radius: 4px;
    margin-bottom: 12px;
    font-family: 'Courier New', monospace;
    font-size: 1rem;
    box-shadow: inset 0 0 6px #00FF00;
  }
  .modal input::placeholder {
    color: #33FF3366;
  }
  .modal .img-preview {
    width: 80px;
    height: 80px;
    object-fit: cover;
    border-radius: 6px;
    border: 1px solid #004400;
    margin-bottom: 12px;
    filter: drop-shadow(0 0 5px #00FF00);
    image-rendering: pixelated;
  }
  .modal-buttons {
    display: flex;
    justify-content: space-between;
  }
  .modal button {
    width: 48%;
    background: #004400;
    border: 1px solid #00FF00;
    color: #33FF33;
    font-weight: bold;
    box-shadow: 0 0 10px #00FF00;
    cursor: pointer;
    transition: all 0.3s;
  }
  .modal button:hover {
    background: #00FF00;
    color: #001100;
  }

  /* Pantalla ingreso contraseña estilo Vista */
  .login-password-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .login-password-screen.active {
    display: flex;
  }
  .login-password-screen img {
    width: 96px;
    height: 96px;
    border-radius: 12px;
    border: 1px solid #006600;
    object-fit: cover;
    filter: drop-shadow(0 0 8px #33FF33);
    image-rendering: pixelated;
  }
  .login-password-screen .user-name {
    font-size: 1.7rem;
    font-weight: 700;
    color: #00FF00;
    text-shadow: 0 0 10px #00FF00;
    letter-spacing: 0.1em;
  }
  .login-password-screen .error-message {
    color: #ff4c4c;
    font-weight: bold;
    text-shadow: 0 0 5px #ff0000;
    min-height: 20px;
  }
  .login-password-screen input[type="password"] {
    width: 280px;
    padding: 12px;
    font-size: 1.2rem;
    border-radius: 8px;
    border: 2px solid #006600;
    background: #003300;
    color: #33FF33;
    font-family: 'Courier New', monospace;
    box-shadow: inset 0 0 10px #00FF00;
    text-align: center;
    image-rendering: pixelated;
  }
  .login-password-screen input::placeholder {
    color: #33FF3366;
  }
  .login-password-screen button {
    width: 280px;
    padding: 10px 0;
    font-family: 'Courier New', monospace;
    font-size: 1.2rem;
    background: #003300;
    border: 1px solid #006600;
    color: #33FF33;
    box-shadow: 0 0 10px #00FF00;
    cursor: pointer;
    user-select: none;
    border-radius: 8px;
    transition: all 0.3s;
  }
  .login-password-screen button:hover {
    background: #00FF00;
    color: #001100;
    border-color: #00FF00;
    box-shadow: 0 0 25px #00FF00;
  }
  .login-password-screen .btn-back {
    margin-top: 6px;
    background: #002200;
    border: 1px solid #004400;
  }
  .login-password-screen .btn-back:hover {
    background: #004400;
    color: #00FF00;
  }

  /* Scrollbar verde */
  .users-list::-webkit-scrollbar {
    width: 6px;
  }
  .users-list::-webkit-scrollbar-thumb {
    background: #004400;
    border-radius: 3px;
    box-shadow: inset 0 0 5px #00FF00;
  }

  /* ----------- CRT FILTER ----------- */

  /* Líneas horizontales */
  .crt-overlay {
    pointer-events:none;
    position: fixed;
    top:0; left:0; width:100%; height:100%;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,255,0,0.04) 0px,
      rgba(0,255,0,0.04) 2px,
      transparent 3px,
      transparent 4px
    );
    z-index: 1000;
    animation: flicker 0.15s infinite alternate;
  }

  @keyframes flicker {
    0% {
      opacity: 0.06;
      background-position: 0 0;
      filter: drop-shadow(0 0 1px #0f0);
    }
    100% {
      opacity: 0.12;
      background-position: 0 2px;
      filter: drop-shadow(0 0 2px #0f0);
    }
  }

  /* Brillo fantasmal */
  .crt-glow {
    pointer-events:none;
    position: fixed;
    top:0; left:0; width:100%; height:100%;
    background:
      radial-gradient(circle at center, rgba(0,255,0,0.2), transparent 60%);
    mix-blend-mode: screen;
    filter: blur(2px);
    z-index: 1001;
    animation: glowPulse 2s infinite ease-in-out alternate;
  }

  @keyframes glowPulse {
    0% {opacity: 0.1;}
    100% {opacity: 0.25;}
  }

  /* Curvatura CRT sutil */
  body::before {
    content: "";
    pointer-events:none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    border-radius: 15px;
    box-shadow: inset 0 0 40px 20px rgba(0,255,0,0.15);
    mix-blend-mode: screen;
    z-index: 999;
  }
</style>
</head>
<body>

<div class="login-box">

  <div class="title" id="title">Seleccione un usuario para iniciar sesión</div>

  <div class="users-list" id="usersList"></div>

  <div class="bottom-buttons">
    <button id="btnAddAccount">Añadir cuenta</button>
    <button id="btnGuest">Entrar como Invitado</button>
  </div>

  <!-- Pantalla ingreso contraseña -->
  <div class="login-password-screen" id="loginPasswordScreen">
    <img id="loginUserImage" alt="Foto usuario" />
    <div class="user-name" id="loginUserName"></div>
    <div class="error-message" id="loginErrorMessage"></div>
    <input type="password" id="loginPasswordInput" placeholder="Contraseña" autocomplete="off" />
    <button id="btnLoginConfirm">Ingresar</button>
    <button id="btnBackToUsers" class="btn-back">Volver</button>
  </div>
</div>

<!-- Modal editar cuenta -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2>Editar Cuenta</h2>
    <label for="inputName">Nombre</label>
    <input type="text" id="inputName" placeholder="Nombre para mostrar" />
    <label for="inputImage">Imagen de perfil</label>
    <input type="file" id="inputImage" accept="image/*" />
    <img src="" alt="Previsualización" class="img-preview" id="imgPreview" style="display:none" />
    <div class="modal-buttons">
      <button id="btnSaveEdit">Guardar</button>
      <button id="btnCancelEdit">Cancelar</button>
    </div>
  </div>
</div>

<!-- CRT Overlay -->
<div class="crt-overlay"></div>
<div class="crt-glow"></div>

<audio id="errorSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

<script>
  let accounts = JSON.parse(localStorage.getItem("accounts") || "[]");

  const usersList = document.getElementById("usersList");
  const btnAddAccount = document.getElementById("btnAddAccount");
  const btnGuest = document.getElementById("btnGuest");
  const title = document.getElementById("title");

  const loginPasswordScreen = document.getElementById("loginPasswordScreen");
  const loginUserImage = document.getElementById("loginUserImage");
  const loginUserName = document.getElementById("loginUserName");
  const loginPasswordInput = document.getElementById("loginPasswordInput");
  const loginErrorMessage = document.getElementById("loginErrorMessage");
  const btnLoginConfirm = document.getElementById("btnLoginConfirm");
  const btnBackToUsers = document.getElementById("btnBackToUsers");
  const errorSound = document.getElementById("errorSound");

  const modalBg = document.getElementById("modalBg");
  const inputName = document.getElementById("inputName");
  const inputImage = document.getElementById("inputImage");
  const imgPreview = document.getElementById("imgPreview");
  const btnSaveEdit = document.getElementById("btnSaveEdit");
  const btnCancelEdit = document.getElementById("btnCancelEdit");

  let selectedUserIndex = null;

  function renderUsers() {
    usersList.innerHTML = "";
    accounts.forEach((acc, i) => {
      const div = document.createElement("div");
      div.className = "user-item";

      div.innerHTML = `
        <div class="user-item-flex">
          <img src="${acc.image}" alt="Foto de ${acc.name}" />
          <div class="user-name">${acc.name}</div>
          <div class="user-controls">
            <button class="btn-remove-screen" title="Quitar usuario">🗑️</button>
            <button class="btn-edit" title="Editar usuario">✏️</button>
          </div>
        </div>
      `;

      // Click para abrir pantalla ingreso contraseña
      div.querySelector(".user-name").parentNode.onclick = (e) => {
        if (e.target.tagName !== "BUTTON") {
          openLoginScreen(i);
        }
      };

      // Quitar de la pantalla (solo quita, no elimina)
      div.querySelector(".btn-remove-screen").onclick = (e) => {
        e.stopPropagation();
        accounts.splice(i, 1);
        localStorage.setItem("accounts", JSON.stringify(accounts));
        renderUsers();
        alert(`Cuenta de ${acc.name} retirada de la pantalla. Puedes añadir otra.`);
      };

      // Editar usuario (pide contraseña para confirmar)
      div.querySelector(".btn-edit").onclick = (e) => {
        e.stopPropagation();
        const password = prompt(`Introduce la contraseña de ${acc.name} para editar:`);
        if (password !== acc.pass) {
          alert("Contraseña incorrecta.");
          return;
        }
        inputName.value = acc.name;
        imgPreview.src = acc.image;
        imgPreview.style.display = "block";
        modalBg.style.display = "flex";
        selectedUserIndex = i;
      };

      usersList.appendChild(div);
    });

    btnAddAccount.style.display = accounts.length >= 3 ? "none" : "inline-block";
  }

  function openLoginScreen(index) {
    selectedUserIndex = index;
    const acc = accounts[index];
    loginUserImage.src = acc.image;
    loginUserName.textContent = acc.name;
    loginPasswordInput.value = "";
    loginErrorMessage.textContent = "";
    loginPasswordInput.focus();

    title.style.display = "none";
    usersList.style.display = "none";
    btnAddAccount.style.display = "none";
    btnGuest.style.display = "none";

    loginPasswordScreen.classList.add("active");
  }

  btnLoginConfirm.onclick = () => {
    if (selectedUserIndex === null) return;

    const inputPass = loginPasswordInput.value.trim();
    if (inputPass === accounts[selectedUserIndex].pass) {
      alert(`Bienvenido ${accounts[selectedUserIndex].name}!`);
      // Aquí podrías continuar sesión o redirigir
    } else {
      loginErrorMessage.textContent = "Contraseña incorrecta.";
      errorSound.play();
      loginPasswordInput.value = "";
      loginPasswordInput.focus();
    }
  };

  btnBackToUsers.onclick = () => {
    loginPasswordScreen.classList.remove("active");
    title.style.display = "block";
    usersList.style.display = "block";
    btnAddAccount.style.display = accounts.length >= 3 ? "none" : "inline-block";
    btnGuest.style.display = "inline-block";
    loginErrorMessage.textContent = "";
    loginPasswordInput.value = "";
    selectedUserIndex = null;
  };

  // Modal editar cuenta - manejar imagen
  inputImage.onchange = (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function (ev) {
        imgPreview.src = ev.target.result;
        imgPreview.style.display = "block";
      };
      reader.readAsDataURL(file);
    } else {
      imgPreview.style.display = "none";
      imgPreview.src = "";
    }
  };

  btnSaveEdit.onclick = () => {
    if (selectedUserIndex === null) return;

    const newName = inputName.value.trim();
    const newImage = imgPreview.src;

    if (!newName) {
      alert("El nombre no puede estar vacío.");
      return;
    }
    if (!newImage) {
      alert("Selecciona una imagen de perfil.");
      return;
    }

    accounts[selectedUserIndex].name = newName;
    accounts[selectedUserIndex].image = newImage;

    localStorage.setItem("accounts", JSON.stringify(accounts));
    modalBg.style.display = "none";
    renderUsers();
  };

  btnCancelEdit.onclick = () => {
    modalBg.style.display = "none";
  };

  // Añadir cuenta nueva (solo pido email, nombre, pass y una imagen predeterminada)
  btnAddAccount.onclick = () => {
    if (accounts.length >= 3) {
      alert("Solo se permiten 3 cuentas visibles.");
      return;
    }
    const gmail = prompt("Introduce Gmail para nueva cuenta:");
    if (!gmail || !validateEmail(gmail)) {
      alert("Email no válido.");
      return;
    }
    if (accounts.some((a) => a.gmail === gmail.toLowerCase())) {
      alert("Ese Gmail ya está registrado.");
      return;
    }
    const pass = prompt("Introduce contraseña para la cuenta:");
    if (!pass) {
      alert("Contraseña no puede estar vacía.");
      return;
    }
    const confirmPass = prompt("Confirma la contraseña:");
    if (pass !== confirmPass) {
      alert("Las contraseñas no coinciden.");
      return;
    }
    const name = prompt("Introduce el nombre para mostrar:");
    if (!name) {
      alert("El nombre no puede estar vacío.");
      return;
    }

    // Imagen predeterminada pixel verde (puedes cambiar esta URL)
    const defaultImage = "https://i.imgur.com/0NvjkmK.png";

    accounts.push({
      gmail: gmail.toLowerCase(),
      name,
      pass,
      image: defaultImage,
    });

    localStorage.setItem("accounts", JSON.stringify(accounts));
    renderUsers();
  };

  btnGuest.onclick = () => {
    alert("Entrando como Invitado...");
  };

  function validateEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  renderUsers();
</script>

</body>
</html>
