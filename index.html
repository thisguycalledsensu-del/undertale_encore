<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Retro</title>

<!-- Fuente pixel estilo Undertale -->
<link href="https://fonts.cdnfonts.com/css/determination-mono" rel="stylesheet">

<style>
body {
    background: black;
    color: #00ff99;
    font-family: 'Determination Mono', monospace;
    text-align: center;
    margin: 0;
}

h1 {
    margin-top: 20px;
    font-size: 40px;
}

.container {
    margin-top: 30px;
}

.profile {
    border: 2px solid #00ff99;
    padding: 10px;
    margin: 10px;
    display: inline-block;
    width: 180px;
    cursor: pointer;
    transition: 0.3s;
}

.profile:hover {
    background: #003322;
}

.profile img {
    width: 100px;
    height: 100px;
    object-fit: cover;
    border: 2px solid #00ff99;
}

button {
    font-family: 'Determination Mono', monospace;
    background: black;
    color: #00ff99;
    border: 2px solid #00ff99;
    padding: 8px;
    cursor: pointer;
    margin-top: 5px;
}

button:hover {
    background: #00ff99;
    color: black;
}

input {
    font-family: 'Determination Mono', monospace;
    background: black;
    color: #00ff99;
    border: 2px solid #00ff99;
    padding: 5px;
    margin: 5px;
}

.form-container {
    display: none;
    margin-top: 20px;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<h1>TERMINAL 1999</h1>

<div class="container" id="profiles">
</div>

<div id="addAccountBlock" class="profile">
    <p>+ AÑADIR CUENTA</p>
</div>

<div class="form-container" id="registerForm">
    <h2>CREAR CUENTA</h2>
    <input type="text" id="username" placeholder="Usuario"><br>
    <input type="file" id="imageInput" accept="image/*"><br>
    <input type="password" id="password" placeholder="Contraseña"><br>
    <input type="password" id="confirmPassword" placeholder="Confirmar contraseña"><br>
    <button onclick="createAccount()">CREAR</button>
</div>

<script>
let accounts = JSON.parse(localStorage.getItem("accounts")) || [];
const maxAccounts = 3;

function saveAccounts() {
    localStorage.setItem("accounts", JSON.stringify(accounts));
}

function renderProfiles() {
    const container = document.getElementById("profiles");
    container.innerHTML = "";

    // Invitado
    const guest = document.createElement("div");
    guest.className = "profile";
    guest.innerHTML = "<p>INVITADO</p>";
    guest.onclick = () => alert("Entrando como Invitado...");
    container.appendChild(guest);

    accounts.forEach((acc, index) => {
        const div = document.createElement("div");
        div.className = "profile";
        div.innerHTML = `
            <img src="${acc.image}">
            <p>${acc.username}</p>
            <button onclick="login(${index}); event.stopPropagation();">INGRESAR</button>
            <button onclick="deleteAccount(${index}); event.stopPropagation();">ELIMINAR</button>
        `;
        container.appendChild(div);
    });

    document.getElementById("addAccountBlock").style.display =
        accounts.length >= maxAccounts ? "none" : "inline-block";
}

document.getElementById("addAccountBlock").onclick = () => {
    if (accounts.length < maxAccounts)
        document.getElementById("registerForm").style.display = "block";
};

function createAccount() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const imageInput = document.getElementById("imageInput");

    if (!username || !password) {
        alert("Completa todos los campos.");
        return;
    }

    if (accounts.some(acc => acc.username.toLowerCase() === username.toLowerCase())) {
        alert("Ese nombre ya está en uso.");
        return;
    }

    if (password !== confirmPassword) {
        alert("Las contraseñas no coinciden.");
        return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
        accounts.push({
            username,
            password,
            image: e.target.result
        });

        saveAccounts();
        renderProfiles();
        document.getElementById("registerForm").style.display = "none";
    };

    if (imageInput.files[0]) {
        reader.readAsDataURL(imageInput.files[0]);
    } else {
        alert("Selecciona una imagen.");
    }
}

function login(index) {
    const inputPassword = prompt("Introduce la contraseña:");
    if (inputPassword === accounts[index].password) {
        alert("Bienvenido " + accounts[index].username);
    } else {
        alert("Contraseña incorrecta.");
    }
}

function deleteAccount(index) {
    if (confirm("¿Eliminar esta cuenta?")) {
        accounts.splice(index, 1);
        saveAccounts();
        renderProfiles();
    }
}

renderProfiles();
</script>

</body>
</html>
