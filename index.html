<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selector Retro</title>

<!-- Fuente pixel estilo Undertale -->
<link href="https://fonts.cdnfonts.com/css/determination-mono" rel="stylesheet">

<style>
body {
    margin: 0;
    background: black;
    font-family: 'Determination Mono', monospace;
    color: #00ff99;
}

h1 {
    text-align: center;
    margin-top: 20px;
    font-size: 36px;
}

#profileSelector {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 30px;
    gap: 20px;
}

.profile {
    border: 2px solid #00ff99;
    padding: 10px;
    width: 150px;
    height: 220px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    background: #000000;
    transition: 0.2s;
}

.profile:hover {
    background: #003322;
    transform: scale(1.05);
}

.profile img {
    width: 100px;
    height: 100px;
    object-fit: cover;
    border: 2px solid #00ff99;
    margin-top: 10px;
}

.profile p {
    margin: 5px 0;
    word-break: break-word;
}

button {
    font-family: 'Determination Mono', monospace;
    background: black;
    color: #00ff99;
    border: 2px solid #00ff99;
    padding: 5px 10px;
    cursor: pointer;
}

button:hover {
    background: #00ff99;
    color: black;
}

#registerForm {
    display: none;
    text-align: center;
    margin-top: 30px;
}

#registerForm input {
    display: block;
    margin: 10px auto;
    padding: 5px;
    background: black;
    color: #00ff99;
    border: 2px solid #00ff99;
}
</style>
</head>
<body>

<h1>SELECCIONA PERFIL</h1>

<div id="profileSelector"></div>

<div id="registerForm">
    <h2>CREAR CUENTA</h2>
    <input type="text" id="username" placeholder="Nombre de usuario">
    <input type="password" id="password" placeholder="Contraseña">
    <input type="password" id="confirmPassword" placeholder="Confirmar contraseña">
    <input type="file" id="imageInput" accept="image/*">
    <button onclick="createAccount()">Crear Cuenta</button>
</div>

<script>
// ------------------ CONFIG ------------------
const maxAccounts = 3;
const guestImage = "https://i.imgur.com/7Y2nZ6k.png"; // Cambia aquí la imagen del invitado
let accounts = JSON.parse(localStorage.getItem("accounts")) || [];

// ------------------ FUNCIONES ------------------
function saveAccounts() {
    localStorage.setItem("accounts", JSON.stringify(accounts));
}

function renderProfiles() {
    const container = document.getElementById("profileSelector");
    container.innerHTML = "";

    // Perfil invitado
    const guestDiv = document.createElement("div");
    guestDiv.className = "profile";
    guestDiv.innerHTML = `
        <img src="${guestImage}">
        <p>INVITADO</p>
    `;
    guestDiv.onclick = () => alert("Entrando como Invitado...");
    container.appendChild(guestDiv);

    // Perfiles existentes
    accounts.forEach((acc, index) => {
        const accDiv = document.createElement("div");
        accDiv.className = "profile";
        accDiv.innerHTML = `
            <img src="${acc.image}">
            <p>${acc.username}</p>
            <button onclick="login(${index}); event.stopPropagation();">Ingresar</button>
            <button onclick="deleteAccount(${index}); event.stopPropagation();">Eliminar</button>
        `;
        container.appendChild(accDiv);
    });

    // Botón añadir cuenta
    if (accounts.length < maxAccounts) {
        const addDiv = document.createElement("div");
        addDiv.className = "profile";
        addDiv.innerHTML = `<p>+ AÑADIR CUENTA</p>`;
        addDiv.onclick = () => document.getElementById("registerForm").style.display = "block";
        container.appendChild(addDiv);
    }
}

// Crear cuenta
function createAccount() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const imageInput = document.getElementById("imageInput");

    if (!username || !password) {
        alert("Completa todos los campos.");
        return;
    }

    if (accounts.some(acc => acc.username.toLowerCase() === username.toLowerCase())) {
        alert("Ese nombre ya está en uso.");
        return;
    }

    if (password !== confirmPassword) {
        alert("Las contraseñas no coinciden.");
        return;
    }

    if (!imageInput.files[0]) {
        alert("Selecciona una imagen.");
        return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
        accounts.push({
            username,
            password,
            image: e.target.result
        });
        saveAccounts();
        renderProfiles();
        document.getElementById("registerForm").style.display = "none";
        document.getElementById("username").value = "";
        document.getElementById("password").value = "";
        document.getElementById("confirmPassword").value = "";
        document.getElementById("imageInput").value = "";
    };
    reader.readAsDataURL(imageInput.files[0]);
}

// Login
function login(index) {
    const inputPass = prompt("Introduce la contraseña:");
    if (inputPass === accounts[index].password) {
        alert("Bienvenido " + accounts[index].username);
    } else {
        alert("Contraseña incorrecta.");
    }
}

// Eliminar cuenta
function deleteAccount(index) {
    if (confirm("¿Eliminar esta cuenta?")) {
        accounts.splice(index, 1);
        saveAccounts();
        renderProfiles();
    }
}

// Render inicial
renderProfiles();
</script>

</body>
</html>
